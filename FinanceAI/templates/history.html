<!DOCTYPE html>
<html>
<head>
<title>History</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="sidebar">
<h2>FinanceAI</h2>

<a href="/history">History</a>

<div class="main">
<h1>History</h1>

<div class="card">
<table>

{% for r in rows %}

<td>₹{{r[1]}}</td>

<td>{{r[3]}}</td>
</tr>
{% endfor %}
</table>
</div>

</div>
</body>
</html>
